<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マネアカ配信画面 - Manebou Live Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Settings Panel -->
        <div class="settings-panel">
            <div class="settings-toggle">⚙️</div>
            <div class="settings-content">
                <h3>配信設定</h3>

                <div class="setting-group">
                    <label for="courseSelect">コース選択:</label>
                    <select id="courseSelect">
                        <option value="mbc-ch1">第1章: お金とは</option>
                        <option value="mbc-ch2">第2章: 貯蓄と投資</option>
                        <option value="mbc-ch3">第3章: ライフプラン</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="lessonSelect">レッスン選択:</label>
                    <select id="lessonSelect">
                        <option value="mbc-1-1">1-1: 紙幣の価値とは</option>
                        <option value="mbc-1-2">1-2: バーター取引</option>
                        <option value="mbc-1-3">1-3: インフレーション</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="subtitleToggle" checked>
                        字幕を表示
                    </label>
                </div>

                <div class="setting-group">
                    <label for="subtitleSize">字幕サイズ:</label>
                    <input type="range" id="subtitleSize" min="12" max="24" value="16">
                    <span id="subtitleSizeValue">16px</span>
                </div>

                <div class="setting-group">
                    <label for="subtitleColor">字幕色:</label>
                    <select id="subtitleColor">
                        <option value="#ffffff">白</option>
                        <option value="#000000">黒</option>
                        <option value="#FFD700">金色</option>
                        <option value="#FF8C00">オレンジ</option>
                    </select>
                </div>

                <div class="timer-section">
                    <h4>配信タイマー</h4>
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                    <div class="timer-buttons">
                        <button class="preset-btn" data-minutes="15">15分</button>
                        <button class="preset-btn" data-minutes="30">30分</button>
                        <button class="preset-btn" data-minutes="60">60分</button>
                        <button class="preset-btn" data-minutes="90">90分</button>
                    </div>
                    <div class="timer-controls">
                        <button id="startBtn" class="control-btn">開始</button>
                        <button id="pauseBtn" class="control-btn">一時停止</button>
                        <button id="resetBtn" class="control-btn">リセット</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Broadcasting Area -->
        <div class="broadcast-area">
            <!-- Left VTuber Space -->
            <div class="vtuber-space left">
                <div class="space-label">VTuber A<br>(OBS配置用)</div>
            </div>

            <!-- Center Content -->
            <div class="center-content">
                <div class="lecture-container">
                    <iframe
                        id="lectureFrame"
                        src="https://manebou-juku.vercel.app/courses/mbc-ch1/lessons/mbc-1-1"
                        title="マネぼう塾レッスン"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Right VTuber Space -->
            <div class="vtuber-space right">
                <div class="space-label">VTuber B<br>(OBS配置用)</div>
            </div>
        </div>

        <!-- Subtitle Area -->
        <div class="subtitle-area">
            <div class="subtitle-status">
                <span id="recordingStatus">●リッスン中...</span>
            </div>
            <div class="subtitle-text" id="subtitleText"></div>
            <div class="transcript-history" id="transcriptHistory"></div>
        </div>

        <!-- Controls -->
        <div class="broadcast-controls">
            <button id="startListening" class="control-button primary">🎙️ 文字起こし開始</button>
            <button id="stopListening" class="control-button">⏹️ 停止</button>
            <button id="clearSubtitle" class="control-button">🗑️ クリア</button>
            <span id="listenStatus" class="status-text"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
